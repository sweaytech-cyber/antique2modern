<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Humanizer - games.og</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body{background:#181714;color:#fff;font-family:Inter, sans-serif;margin:0}
    header{display:flex;justify-content:space-between;padding:1rem 2rem;align-items:center}
    nav a{color:#ddd;margin-right:1rem;text-decoration:none}
    .container{max-width:900px;margin:2rem auto;padding:1rem}
    .card{background:rgba(255,255,255,0.03);padding:1rem;border-radius:8px}
    textarea{width:100%;min-height:220px;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#000;color:#fff}
    button{padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <div>
      <a href="index.html" style="color:#fff;text-decoration:none;font-weight:600">games.og</a>
    </div>
    <nav>
      <a href="IDE.html">IDE</a>
      <a href="detector.html">Detector</a>
      <a href="humanizer.html">Humanizer</a>
      <a href="#" onclick="loadGoogleSearch();return false;">Google</a>
    </nav>
  </header>

  <div class="container">
    <h2>Essay Humanizer</h2>
    <div class="card">
      <textarea id="humText" placeholder="Paste essay/text to humanize"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button id="humRun" style="background:#167f3a;color:#fff">Humanize</button>
        <button id="humClear" style="background:#333;color:#fff">Clear</button>
      </div>
      <div id="humResult" style="margin-top:12px;color:#ddd"></div>
    </div>
  </div>

  <!-- Terms modal (same as index) -->
  <div id="ogTermsModal" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:9999;visibility:visible;">
    <div style="background:#fff;color:#000;padding:20px;border-radius:12px;max-width:720px;width:90%;">
      <h3 style="margin:0 0 8px 0;font-family:Inter, sans-serif;">Terms &amp; Conditions</h3>
      <p style="margin:0 0 12px 0;">I agree that I will not use this tool for school assignments or any malicious activity.</p>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <input id="ogTermsCheckbox" type="checkbox" style="width:18px;height:18px;" />
        <label for="ogTermsCheckbox">I understand</label>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button id="ogDontAgree" style="padding:8px 12px;border-radius:6px;border:1px solid #ccc;background:#f3f3f3;">I Don't Agree</button>
        <button id="ogAgree" style="padding:8px 12px;border-radius:6px;background:#222;color:#fff;border:none;">I Agree</button>
      </div>
    </div>
  </div>

  <script>
    // Terms modal
    (function(){
      const modal = document.getElementById('ogTermsModal');
      const agree = document.getElementById('ogAgree');
      const dont = document.getElementById('ogDontAgree');
      const chk = document.getElementById('ogTermsCheckbox');
      agree.addEventListener('click', ()=>{
        if(!chk.checked){ alert('Please check the box to confirm.'); return; }
        try{ localStorage.setItem('og_terms_accepted','1'); }catch(e){}
        modal.style.visibility='hidden';
        document.body.style.overflow='auto';
      });
      dont.addEventListener('click', ()=>{ window.location.href='blocked.html'; });
      window.addEventListener('load', ()=>{
        try{
          if(!localStorage.getItem('og_terms_accepted')){ modal.style.visibility='visible'; document.body.style.overflow='hidden'; }
          else { modal.style.visibility='hidden'; document.body.style.overflow='auto'; }
        }catch(e){ modal.style.visibility='visible'; document.body.style.overflow='hidden'; }
      });
    })();

    // Humanizer logic
    (function(){
      const btn = document.getElementById('humRun');
      const clr = document.getElementById('humClear');
      const txt = document.getElementById('humText');
      const out = document.getElementById('humResult');
      btn.addEventListener('click', ()=>{
        let text = txt.value||'';
        if(!text.trim()){ out.innerText='No text provided.'; return; }
        text = text.replace(/,\s+(?=[A-Za-z]{20,})/g, '. ');
        const dict = { 'utilize':'use','approximately':'about','endeavor':'try','purchase':'buy','submit':'send' };
        text = text.replace(/\b(utilize|approximately|endeavor|purchase|submit)\b/gi, m=>dict[m.toLowerCase()]||m);
        text = text.split('\n').map(p=>{
          if(p.split(' ').length>30){ const parts=p.split('. '); for(let i=0;i<parts.length;i+=2) if(Math.random()>0.6) parts[i]+=', I think'; return parts.join('. '); } return p;
        }).join('\n');
        text = text.replace(/\s+([.,!?;:])/g,'$1');
        txt.value = text;
        out.innerText = 'Humanization complete.';
      });
      clr.addEventListener('click', ()=>{ txt.value=''; out.innerText=''; });
    })();
  </script>
</body>
</html>
