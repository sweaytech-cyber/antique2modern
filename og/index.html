    }

    .top-nav .logo {

      letter-spacing: 1px;
      color: #a8f4ff;
      text-shadow: 0 0 12px rgba(168, 244, 255, 0.45);
    }

    .top-nav .links a {
      margin-right: 16px;
      color: #d7f7ff;
      text-decoration: none;
      font-size: 19px;
      font-weight: bold;
      padding: 10px 18px;
      border: 1px solid rgba(215, 247, 255, 0.35);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.25s ease;
    }

    .top-nav .links a:hover {
      box-shadow: 0 0 18px rgba(168, 244, 255, 0.3);
      color: #fff;
      border-color: rgba(168, 244, 255, 0.65);
    }

    .top-nav .search-box {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .top-nav .search-box input {
      padding: 10px 14px;
      font-size: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: #e8f7ff;
      outline: none;
      min-width: 240px;
      transition: border-color 0.25s ease;
    }

    .top-nav .search-box input:focus {
      border-color: rgba(168, 244, 255, 0.65);
    }

    .top-nav .search-box button {
      padding: 10px 16px;
      font-size: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, rgba(168, 244, 255, 0.26), rgba(64, 144, 213, 0.95));
      color: #030a12;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 10px 24px rgba(59, 121, 193, 0.18);
    }

    .top-nav .search-box button:hover {
      transform: translateY(-1px);
      background: rgba(168, 244, 255, 0.95);
    }

    .top-nav .cta-button {
      margin-left: 24px;
      padding: 12px 22px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #e8f7ff;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: all 0.25s ease;
    }

    .top-nav .cta-button:hover {
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 12px 28px rgba(168, 244, 255, 0.18);
    }

    header {
      position: relative;
      text-align: center;

      min-height: 620px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 30px;
    }

    header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      filter: blur(1px);
    }

    header h1 {
      font-size: 4.5rem;

      letter-spacing: 0.06em;
      line-height: 1.02;
      max-width: 980px;

    }

      max-width: 760px;

      color: rgba(235, 247, 255, 0.86);
      font-size: 1.25rem;
      line-height: 1.8;
      letter-spacing: 0.01em;
      margin-bottom: 28px;
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }

    .hero-button {
      padding: 16px 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
      min-width: 240px;

    }

      background: rgba(255, 255, 255, 0.18);

    }

    .hero-panel {

      z-index: 2;
      width: min(1200px, 100%);
      padding: 64px 42px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(7, 18, 36, 0.78);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }

    .hero-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg, rgba(102, 204, 255, 0.12), transparent 35%);
      border-radius: 32px;
    }

    .header-box {
      display: none;
    }

    .welcome-box {
      display: none;
    }

    .header-box .title {
      font-size: 30px;
      font-weight: 700;
      color: #f9ffff;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: 1px;
    }

    .game-suggestion {
      margin-top: 14px;
      font-size: 15px;
      color: #9be8ff;
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
    }

    .info-link {
      text-align: center;
      margin-top: 10px;
    }

    .info-link a {
      color: #b4f3ff;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .welcome-box {
      position: absolute;
      top: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(16px);
      border-radius: 22px;
      color: #eef9ff;
      padding: 20px;
      width: 240px;
      text-align: left;
      font-size: 18px;
      line-height: 1.5;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    #game-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      padding: 34px 32px 18px;
      max-width: 1420px;
      margin: 0 auto;
    }

    .game-box {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 26px;
      padding: 18px;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 20px 50px rgba(3, 18, 33, 0.35);
      backdrop-filter: blur(12px);
    }

    .game-box:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 28px 70px rgba(3, 18, 33, 0.45);
    }

    .game-image {
      width: 100%;
      height: 185px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);

<!-- Pagination and Script -->
<style>
  /* Pagination aligns with game container */
  .pagination {
    display: flex;
    justify-content: space-between; /* arrows on sides, page number centered */
    align-items: center;
    margin: 30px 30px; /* same as #game-container padding */
    font-family: 'Caveat', cursive;
    font-size: 22px;
    gap: 15px;
    flex-wrap: wrap;
  }

  .pagination button {
    background-color: #111;
    color: #D4B978;
    border: 2px solid #D4B978;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .pagination button:hover {
    background-color: #D4B978;
    color: #000;
  }

  .pagination #pageInfo {
    flex-grow: 1;
    text-align: center;
  }
</style>

<div id="pagination" class="pagination">
  <button id="prevPage">&laquo; </button>
  <span id="pageInfo">1 / 2</span>
  <button id="nextPage"> &raquo;</button>
</div>

<script>
  const gamesPerPage = 50; // Updated: 50 games per page
  const games = Array.from(document.querySelectorAll(".game-box"));
  const pageInfo = document.getElementById("pageInfo");
  const prevBtn = document.getElementById("prevPage");
  const nextBtn = document.getElementById("nextPage");

  let currentPage = 1;
  const totalPages = Math.ceil(games.length / gamesPerPage);

  function showPage(page) {
    currentPage = page;
    const start = (page - 1) * gamesPerPage;
    const end = start + gamesPerPage;
    games.forEach((game, index) => {
      game.style.display = (index >= start && index < end) ? "block" : "none";
    });
    pageInfo.textContent = `${currentPage} / ${totalPages}`;
  }

  prevBtn.addEventListener("click", () => {
    if (currentPage > 1) showPage(currentPage - 1);
  });

  nextBtn.addEventListener("click", () => {
    if (currentPage < totalPages) showPage(currentPage + 1);
  });

  // Initialize first page
  showPage(1);
</script>
